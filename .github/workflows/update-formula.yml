name: Update Formula

on:
  workflow_dispatch:
  repository_dispatch:
    types: [antigravity-cli-release]
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update formula from official installer
        run: ./scripts/update-formula.sh

      - name: Commit changes
        run: |
          if git diff --quiet -- Formula/antigravity-cli.rb; then
            echo "No formula changes."
            exit 0
          fi

          version="$(ruby -ne 'puts $1 if /^  version "([^"]+)"/ =~ $_' Formula/antigravity-cli.rb)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/antigravity-cli.rb
          git commit -m "Update antigravity-cli to ${version}"
          git push
